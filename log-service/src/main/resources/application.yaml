server:
  port: ${PORT:7020}

spring:
  application:
    name: log-service
  profiles:
    default: local
  jackson:
    serialization:
      write-dates-as-timestamps: false
  output:
    ansi:
      enabled: always
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] trace_id=%X{trace_id:-} request_id=%X{request_id:-} %logger{36} - %msg%n"

app:
  kafka:
    topics:
      log-events: ${KAFKA_TOPIC_LOG_EVENTS:mvp.log-events}
