spring:
  datasource:
#    url: jdbc:postgresql://${DB_HOST:log-analyzer-postgres}:${DB_PORT:5432}/${DB_NAME:log-analyzer-db}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:log-analyzer-db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  kafka:
#    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:log-analyzer-kafka:9092}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:event-consumer}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:event-consumer}
      retry:
        max-attempts: ${KAFKA_CONSUMER_RETRY_MAX_ATTEMPTS:3}
        interval-ms: ${KAFKA_CONSUMER_RETRY_INTERVAL_MS:1000}
    topics:
      log-events: ${KAFKA_TOPIC_LOG_EVENTS:mvp.log-events}
      log-events-dlq: ${KAFKA_TOPIC_LOG_EVENTS_DLQ:mvp.log-events.dlq}
  opensearch:
    url: ${OPENSEARCH_URL:http://localhost:19200}
    index-name: ${OPENSEARCH_INDEX_NAME:logs-write}
    pipeline-name: ${OPENSEARCH_PIPELINE_NAME:logs-pipeline}
